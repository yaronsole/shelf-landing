<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Shelf — Picks chosen for your taste</title>
<meta name="description" content="Book recommendations chosen for your taste. Free on the App Store.">

<!-- ============================================================
     META PIXEL  —  PASTE YOUR PIXEL ID where it says YOUR_PIXEL_ID
     (Meta Events Manager -> Data Sources -> your pixel -> Settings)
     Appears twice: the init() call below AND the <noscript> img.
     The page renders fine while this is still a placeholder; it just
     won't report anything to Meta until the real ID is filled in.
     This Pixel + the Lead event on the CTA are the entire point of
     the page (cost-per-App-Store-tap). Do not remove them.
     ============================================================ -->
<script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', 'YOUR_PIXEL_ID');
  fbq('track', 'PageView');
</script>
<noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/></noscript>
<!-- ============================================================ -->

<style>
  /* === Shelf design tokens (from app: ColorHex.swift / splash) === */
  :root{
    --cream:#FAF6F0;        /* signature surface */
    --ink:#1A1A1A;          /* CTA / near-black text */
    --cover-radius:6px;     /* splash cover wall radius */
    --cta-radius:14px;      /* full-width black CTA radius */
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --drift:70s;            /* slow, calm upward drift */
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--sans);
    background:var(--cream);
    color:var(--ink);
    overflow:hidden;            /* single screen, no scroll */
    -webkit-font-smoothing:antialiased;
  }
  /* Stage sized to the SMALL viewport so mobile browser chrome can
     never clip the CTA (svh = smallest stable viewport height). */
  .stage{
    position:relative;
    height:100vh;               /* fallback */
    height:100svh;
    max-width:480px;margin:0 auto;
    display:flex;flex-direction:column;
    overflow:hidden;
    background:var(--cream);
  }

  /* ===== drifting cover wall: 2 columns, slow upward drift, 55% opacity ===== */
  .wall{
    position:absolute;inset:0;
    display:grid;grid-template-columns:1fr 1fr;
    gap:14px;padding:14px;
    opacity:.55;
    z-index:1;
    pointer-events:none;
  }
  .col{display:flex;flex-direction:column;}
  /* Two stacked copies per column. Spacing is per-cover margin-bottom (NOT
     flex `gap`) so the run height is an exact multiple of one cover-block;
     translateY(-50%) then lands precisely one set down -> seamless loop with
     no half-gap jump at the seam. */
  .col .run{display:flex;flex-direction:column;animation:drift var(--drift) linear infinite;}
  .col .run .cover{margin-bottom:14px;}
  .colB{margin-top:-130px;}      /* vertical offset so columns don't line up */
  @keyframes drift{
    from{transform:translateY(0);}
    to{transform:translateY(-50%);}
  }
  .cover{
    width:100%;aspect-ratio:2/3;        /* app cover ratio */
    border-radius:var(--cover-radius);
    box-shadow:0 4px 12px rgba(0,0,0,.12);
    background-size:cover;background-position:center;
    background-color:#e7e0d4;           /* tint shown until image paints */
  }

  /* ===== bottom cream fade (app uses ~260px) ===== */
  .fade{
    position:absolute;left:0;right:0;bottom:0;height:320px;
    background:linear-gradient(to top,var(--cream) 32%,rgba(250,246,240,.85) 62%,transparent);
    z-index:2;pointer-events:none;
  }
  /* soft top fade too, so covers bleed in cleanly */
  .fade-top{
    position:absolute;left:0;right:0;top:0;height:120px;
    background:linear-gradient(to bottom,var(--cream),transparent);
    z-index:2;pointer-events:none;
  }

  /* ===== foreground content (anchored to lower third) ===== */
  .content{
    position:relative;z-index:3;
    margin-top:auto;
    padding:0 24px calc(40px + env(safe-area-inset-bottom));
    text-align:center;
  }
  .headline{
    font-size:25px;line-height:1.2;font-weight:700;letter-spacing:-.02em;
    margin-bottom:10px;
  }
  .sub{
    font-size:16px;line-height:1.45;color:#4a4a4a;font-weight:400;
    margin-bottom:24px;max-width:300px;margin-left:auto;margin-right:auto;
  }
  .cta{
    display:block;width:100%;
    background:var(--ink);color:var(--cream);
    text-align:center;padding:17px;border-radius:var(--cta-radius);
    font-size:17px;font-weight:600;text-decoration:none;
    box-shadow:0 6px 20px rgba(26,26,26,.25);
    transition:transform .12s ease;
  }
  .cta:active{transform:scale(.98);}
  .meta{
    margin-top:14px;font-size:13px;color:#8a8378;font-weight:500;
    letter-spacing:.01em;
  }
  /* desktop / large-screen preview: framed cream card on a warm backdrop */
  @media (min-width:481px){
    body{background:#e9e3d9;}
    .stage{box-shadow:0 0 60px rgba(0,0,0,.12);}
  }
</style>
</head>
<body>
  <div class="stage">

    <!-- ============================================================

         (colA #3) are separated by a cover; Creativity, Inc. (colB #2) sits
         diagonally between them. NOTE: per owner override, Obama + Open are
         public-figure face covers (see fetch_covers.py). Each column's
         9-cover set is duplicated once so the upward drift loops seamlessly
         (translateY(-50%) lands exactly on the copy).
         ============================================================ -->
    <div class="wall" aria-hidden="true">
      <div class="col colA">
        <div class="run">
          <!-- set 1 (colA): Obama #1, Open #3 (separated by Crawdads) -->
          <div class="cover" style="background-image:url('covers/11-promised-land.jpg')"></div>
          <div class="cover" style="background-image:url('covers/01-crawdads.jpg')"></div>
          <div class="cover" style="background-image:url('covers/08-open-agassi.jpg')"></div>

          <div class="cover" style="background-image:url('covers/16-goldfinch.jpg')"></div>
          <div class="cover" style="background-image:url('covers/17-crying-h-mart.jpg')"></div>
          <!-- set 2 (duplicate, for seamless loop) -->
          <div class="cover" style="background-image:url('covers/11-promised-land.jpg')"></div>
          <div class="cover" style="background-image:url('covers/01-crawdads.jpg')"></div>
          <div class="cover" style="background-image:url('covers/08-open-agassi.jpg')"></div>
          <div class="cover" style="background-image:url('covers/03-little-fires.jpg')"></div>
          <div class="cover" style="background-image:url('covers/09-vanishing-half.jpg')"></div>
          <div class="cover" style="background-image:url('covers/15-educated.jpg')"></div>
          <div class="cover" style="background-image:url('covers/13-pachinko.jpg')"></div>
          <div class="cover" style="background-image:url('covers/16-goldfinch.jpg')"></div>
          <div class="cover" style="background-image:url('covers/17-crying-h-mart.jpg')"></div>
        </div>
      </div>
      <div class="col colB">
        <div class="run">
          <!-- set 1 (colB): Creativity, Inc. #2 (non-face, between the two faces) -->
          <div class="cover" style="background-image:url('covers/02-normal-people.jpg')"></div>

          <div class="cover" style="background-image:url('covers/10-seven-husbands.jpg')"></div>
          <div class="cover" style="background-image:url('covers/12-lessons-chemistry.jpg')"></div>
          <div class="cover" style="background-image:url('covers/14-gentleman-moscow.jpg')"></div>
          <div class="cover" style="background-image:url('covers/04-nightingale.jpg')"></div>
          <div class="cover" style="background-image:url('covers/18-just-mercy.jpg')"></div>
          <!-- set 2 (duplicate, for seamless loop) -->
          <div class="cover" style="background-image:url('covers/02-normal-people.jpg')"></div>
          <div class="cover" style="background-image:url('covers/06-creativity-inc.jpg')"></div>
          <div class="cover" style="background-image:url('covers/05-such-a-fun-age.jpg')"></div>
          <div class="cover" style="background-image:url('covers/07-american-marriage.jpg')"></div>
          <div class="cover" style="background-image:url('covers/10-seven-husbands.jpg')"></div>
          <div class="cover" style="background-image:url('covers/12-lessons-chemistry.jpg')"></div>
          <div class="cover" style="background-image:url('covers/14-gentleman-moscow.jpg')"></div>
          <div class="cover" style="background-image:url('covers/04-nightingale.jpg')"></div>
          <div class="cover" style="background-image:url('covers/18-just-mercy.jpg')"></div>
        </div>
      </div>
    </div>

    <div class="fade-top" aria-hidden="true"></div>
    <div class="fade" aria-hidden="true"></div>

    <!-- foreground -->
    <div class="content">
      <h1 class="headline">The end of<br>&lsquo;what should I read next?&rsquo;</h1>
      <p class="sub">Curated and personalized book recommendations, free.</p>
      <a class="cta" href="https://apps.apple.com/app/id6775563720"
         onclick="if(window.fbq)fbq('track','Lead',{content_name:'AppStore_tap'});">
        Get Shelf on the App Store
      </a>
      <div class="meta">Free · No account needed</div>
    </div>

  </div>

<script>
  // Respect reduced-motion: freeze the drift if the user prefers it.
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.querySelectorAll('.run').forEach(function(r){ r.style.animation='none'; });
  }
</script>
</body>
</html>
